services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev --workspace server"
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      CLIENT_URL: http://localhost:5173
      API_PUBLIC_URL: http://localhost:5000
      MONGO_URI: mongodb://mongo:27017/construction_daily_log
      JWT_SECRET: local-access-secret-change-me
      JWT_REFRESH_SECRET: local-refresh-secret-change-me
      UPLOAD_DIR: uploads
    volumes:
      - .:/app
      - /app/node_modules
      - /app/client/node_modules
      - /app/server/node_modules

volumes:
  mongo_data:
