services:
  - type: web
    name: construction-ou63
    env: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://construction-1-3qus.onrender.com,http://localhost:5173,http://127.0.0.1:5173
      - key: API_PUBLIC_URL
        value: https://construction-ou63.onrender.com
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENABLE_EMAIL_NOTIFICATIONS
        value: true
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_SEND_TIMEOUT_MS
        value: 15000

  - type: web
    name: construction-frontend
    env: static
    rootDir: client
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://construction-ou63.onrender.com
